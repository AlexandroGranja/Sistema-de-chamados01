# Stack completo — Fase C5 (dev/staging)
# Uso: docker compose -f docker-compose.stack.yml up -d --build
#
# Acesso via nginx: http://localhost:8088/chamados/ | /telefones/ | /api/

services:
  postgres:
    image: postgres:16-alpine
    container_name: gt_stack_postgres
    environment:
      POSTGRES_USER: telefones
      POSTGRES_PASSWORD: telefones
      POSTGRES_DB: gerenciamento_telefones
    volumes:
      - gt_stack_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telefones -d gerenciamento_telefones"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: gt_stack_api
    env_file:
      - deploy/stack.env.example
    environment:
      DATABASE_URL: postgresql://telefones:telefones@postgres:5432/gerenciamento_telefones
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: gt_stack_web
    depends_on:
      api:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: deploy/Dockerfile.streamlit
    container_name: gt_stack_streamlit
    env_file:
      - deploy/stack.env.example
    environment:
      DATABASE_URL: postgresql://telefones:telefones@postgres:5432/gerenciamento_telefones
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: gt_stack_nginx
    ports:
      - "8088:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - streamlit

volumes:
  gt_stack_pg_data:
